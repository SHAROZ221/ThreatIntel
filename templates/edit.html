<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatIntel - Edit Threat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-app: #080b11;
            --bg-card: #0f172a;
            --bg-input: #0b0f19;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(99, 102, 241, 0.25);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent-indigo: #6366f1;
            --accent-indigo-hover: #4f46e5;
            --accent-red: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .edit-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            transition: border-color 0.25s ease;
        }
        .edit-card:hover {
            border-color: var(--border-hover);
        }

        .edit-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13.5px;
            height: 42px;
            transition: all 0.25s ease;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-indigo);
            background: var(--bg-input);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-control::placeholder { color: #475569; }
        .form-select option { background: var(--bg-card); color: var(--text-primary); }

        .btn-save {
            background: var(--accent-indigo);
            border: none;
            color: #ffffff;
            padding: 0 24px;
            height: 42px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            line-height: 42px;
        }

        .btn-save:hover {
            background: var(--accent-indigo-hover);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 0 24px;
            height: 40px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            line-height: 40px;
            margin-left: 12px;
        }

        .btn-cancel:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.05);
        }
    </style>
</head>
<body>

<div class="edit-card">
    <div class="edit-title">✏️ Edit Registry Entry</div>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Indicator</label>
            <input type="text" name="indicator" class="form-control" value="{{ threat[1] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-select">
                <option value="IP" {% if threat[2] == "IP" %}selected{% endif %}>IP Address</option>
                <option value="Domain" {% if threat[2] == "Domain" %}selected{% endif %}>Domain</option>
                <option value="Hash" {% if threat[2] == "Hash" %}selected{% endif %}>File Hash</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" value="{{ threat[3] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Risk Score (0-100)</label>
            <input type="number" name="risk_score" class="form-control" value="{{ threat[4] }}" min="0" max="100" required>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
