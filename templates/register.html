<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatIntel Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #1a1d2e;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: #161b27;
            border: 1px solid #1e2640;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #1a7a4a, #00ff88);
        }

        .register-title {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .register-title span {
            color: #1a7a4a;
        }

        .register-subtitle {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-control {
            background: #0f1117;
            border: 1px solid #1e2640;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-control:focus {
            outline: none;
            border-color: #1a7a4a;
            background: #0f1117;
            color: #e2e8f0;
            box-shadow: 0 0 0 3px rgba(26, 122, 74, 0.15);
        }

        .btn-register {
            background: #1a7a4a;
            border: none;
            color: white;
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-register:hover {
            background: #15693f;
        }

        .alert-danger {
            background: rgba(247, 95, 95, 0.1);
            border: 1px solid rgba(247, 95, 95, 0.2);
            color: #f75f5f;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .alert-success {
            background: rgba(79, 175, 122, 0.1);
            border: 1px solid rgba(79, 175, 122, 0.2);
            color: #4faf7a;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .login-link {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
        }

        .login-link a {
            color: #1a7a4a;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="register-title">🔍 Threat<span>Intel</span> Register</div>
    <div class="register-subtitle">Create SOC Analyst Profile</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert-{% if category == 'success' %}success{% else %}danger{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Create username" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create password" required>
        </div>
        <button type="submit" class="btn-register">Register Profile</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
