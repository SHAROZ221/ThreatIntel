<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatIntel - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-app: #080b11;
            --bg-card: #0f172a;
            --bg-input: #0b0f19;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(99, 102, 241, 0.25);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent-indigo: #6366f1;
            --accent-indigo-hover: #4f46e5;
            --accent-red: #ef4444;
            --accent-green: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            transition: border-color 0.25s ease;
        }
        .register-card:hover {
            border-color: var(--border-hover);
        }

        .register-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .register-title span {
            color: var(--accent-indigo);
        }

        .register-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13.5px;
            height: 42px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-indigo);
            background: var(--bg-input);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-control::placeholder { color: #475569; }

        .btn-register {
            background: var(--accent-indigo);
            border: none;
            color: #ffffff;
            width: 100%;
            height: 42px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn-register:hover {
            background: var(--accent-indigo-hover);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .login-link {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 28px;
        }

        .login-link a {
            color: var(--accent-indigo);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="register-title">Threat<span>Intel</span></div>
    <div class="register-subtitle">Create Analyst Profile</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert-{% if category == 'success' %}success{% else %}danger{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Create username" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create password" required>
        </div>
        <button type="submit" class="btn-register">Register Analyst</button>
    </form>

    <div class="login-link">
        Already registered? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
