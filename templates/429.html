<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>429 Too Many Requests | ThreatIntel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #080c14;
            background-image: radial-gradient(circle at top, #111827 0%, #030712 100%);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: #0d1220;
            border: 1px solid #1a2336;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ef4444, #f59e0b);
        }

        .error-code {
            font-size: 64px;
            font-weight: 800;
            color: #ef4444;
            line-height: 1;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace;
        }

        .error-title {
            font-size: 20px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .error-description {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .btn-back {
            background: transparent;
            border: 1px solid #1e293b;
            color: #f1f5f9;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-back:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="error-code">429</div>
    <div class="error-title">Rate Limit Exceeded</div>
    <div class="error-description">
        You are making too many requests. To prevent brute-force attacks and conserve OSINT API query quotas, request speeds on this command center are restricted. Please wait a moment and try again.
    </div>
    <a href="/" class="btn-back">Return to Dashboard</a>
</div>

</body>
</html>
